<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form HIMATIK 2026</title>

<style>
/* BODY & BACKGROUND */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #3498db, #6dd5fa);
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
}

/* CONTAINER */
.container {
    background: white;
    max-width: 850px;
    width: 100%;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.8s ease-out;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* HEADER */
.header-flex {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;
    margin-bottom: 30px;
    text-align: left;
}

.logo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.logo:hover {
    transform: scale(1.1) rotate(5deg);
}

h2 {
    margin: 0;
    color: #2c3e50;
    font-size: 24px;
}

p.subtitle {
    margin: 5px 0 0;
    color: #7f8c8d;
    font-size: 14px;
}

/* TABLE FORM */
table {
    width: 100%;
    border-collapse: collapse;
}

td {
    padding: 12px 10px;
    vertical-align: middle; /* Lebih rapi untuk input satu baris */
}

.label-column {
    font-weight: 600;
    width: 35%;
    color: #34495e;
}

/* Memastikan textarea dan checkbox punya vertikal align top agar rapi */
tr.top-align td {
    vertical-align: top;
    padding-top: 15px;
}

/* INPUTS */
input[type="text"], 
input[type="number"], 
input[type="email"], 
input[type="date"], 
select, 
textarea {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #dcdde1;
    transition: 0.3s;
    font-size: 14px;
    box-sizing: border-box;
}

input:focus, select:focus, textarea:focus {
    border-color: #3498db;
    outline: none;
    box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
}

/* CHECKBOX & RADIO SPACING */
.checkbox-group label, .radio-group label {
    margin-right: 15px;
    font-size: 14px;
    cursor: pointer;
}

/* CANVAS */
canvas {
    display: block;
    margin: 0 auto 25px;
    background-color: #fdfdfd;
    border: 2px dashed #bdc3c7;
    border-radius: 12px;
}

/* BUTTON */
.btn-group {
    text-align: center;
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #eee;
}

button {
    padding: 12px 35px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    margin: 0 10px;
}

.btn-submit {
    background: #2ecc71;
    color: white;
}

.btn-submit:hover {
    background: #27ae60;
    box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
}

.btn-reset {
    background: #e74c3c;
    color: white;
}

.btn-reset:hover {
    background: #c0392b;
    box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
}
</style>
</head>

<body>

<div class="container">

<header class="header-flex">
    <img src="LOGO.jpeg" class="logo" alt="Logo HIMATIK">
    <div>
        <h2>Formulir HIMATIK 2026</h2>
        <p class="subtitle">Gabung dan berkembang bersama kami 🚀</p>
    </div>
</header>

<canvas id="myCanvas" width="150" height="100"></canvas>

<form action="#" method="post" enctype="multipart/form-data">

<table>
    <tr>
        <td class="label-column"><label for="nama">Nama Lengkap</label></td>
        <td><input type="text" id="nama" name="nama" placeholder="Contoh: Nabil Wahdi" required></td>
    </tr>

    <tr>
        <td class="label-column"><label for="nim">NIM</label></td>
        <td><input type="number" id="nim" name="nim" placeholder="Masukkan NIM Anda"></td>
    </tr>

    <tr>
        <td class="label-column"><label for="email">Email Kampus</label></td>
        <td><input type="email" id="email" name="email" placeholder="nama@stu.pnj.ac.id"></td>
    </tr>

    <tr>
        <td class="label-column"><label for="tgl_lahir">Tanggal Lahir</label></td>
        <td><input type="date" id="tgl_lahir" name="tgl_lahir"></td>
    </tr>

    <tr>
        <td class="label-column">Jenis Kelamin</td>
        <td class="radio-group">
            <input type="radio" id="pria" name="jk" value="Laki-laki"> <label for="pria">Laki-laki</label>
            <input type="radio" id="wanita" name="jk" value="Perempuan"> <label for="wanita">Perempuan</label>
        </td>
    </tr>

    <tr>
        <td class="label-column"><label for="prodi">Program Studi</label></td>
        <td>
            <select id="prodi" name="prodi">
                <option value="">-- Pilih Prodi --</option>
                <option value="TI">Teknik Informatika</option>
                <option value="TMJ">Teknik Multimedia Jaringan</option>
                <option value="TMD">Teknik MultiMedia Digital</option>
            </select>
        </td>
    </tr>

    <tr class="top-align">
        <td class="label-column">Minat Bidang</td>
        <td class="checkbox-group">
            <input type="checkbox" id="BENDUM" name="minat" value="BENDUM"> <label for="BENDUM">Bendahara Umum</label><br>
            <input type="checkbox" id="KOMINFO" name="minat" value="KOMINFO"> <label for="KOMINFO">Komunikasi Dan Informasi</label><br>
            <input type="checkbox" id="TIK UPDATE" name="minat" value="TIK UPDATE"> <label for="TIK UPDATE">TIK Update</label><br>
            <input type="checkbox" id="KEROH" name="minat" value="KEROH"> <label for="KEROH">Kerohanian</label><br>
            <input type="checkbox" id="KESMA" name="minat" value="KESMA"> <label for="KESMA">Kesehatan Masyarakat</label><br>
            <input type="checkbox" id="LITBANG" name="minat" value="LITBANG"> <label for="LITBANG">Penelitian Dan Pengembangan</label><br>
            <input type="checkbox" id="DIKTEK" name="minat" value="DIKTEK"> <label for="DIKTEK">Pendidikan Dan Teknologi</label><br>
            <input type="checkbox" id="SOSMA" name="minat" value="SOSMA"> <label for="SOSMA">Sosial Mahasiswa</label><br>
            <input type="checkbox" id="BISMIT" name="minat" value="BISMIT"> <label for="BISMIT">Bisnis Dan Kemitraan</label><br>
            <input type="checkbox" id="KREATF" name="minat" value="KREATF"> <label for="KREATF">Kreatif</label><br>
            <input type="checkbox" id="SOSPOL" name="minat" value="SOSPOL"> <label for="SOSPOL">Sosial Politik</label>
        </td>
    </tr>

    <tr>
        <td class="label-column"><label for="foto">Upload Foto KTM</label></td>
        <td><input type="file" id="foto" name="foto" style="border:none; padding: 5px 0;"></td>
    </tr>

    <tr>
        <td class="label-column"><label for="skill">Tingkat Keinginan Masuk</label></td>
        <td>
            <input type="range" id="skill" name="skill" min="0" max="100">
            <div style="text-align: right; font-size: 11px; color: #7f8c8d;">(Skala 0 - 100)</div>
        </td>
    </tr>

    <tr>
        <td class="label-column"><label for="warna">Warna Favorit Identitas</label></td>
        <td><input type="color" id="warna" name="warna" value="#3498db" style="height: 40px; cursor: pointer;"></td>
    </tr>

    <tr class="top-align">
        <td class="label-column"><label for="motivasi">Motivasi Bergabung</label></td>
        <td><textarea id="motivasi" name="motivasi" rows="4" placeholder="Ceritakan alasan Anda..."></textarea></td>
    </tr>
</table>

<div class="btn-group">
    <button type="submit" class="btn-submit">Daftar Sekarang</button>
    <button type="reset" class="btn-reset">Ulangi Form</button>
</div>

</form>

</div>

<script>
// Canvas maskot sederhana
var c = document.getElementById("myCanvas");
var ctx = c.getContext("2d");

// wajah
ctx.beginPath();
ctx.arc(75, 50, 40, 0, 2 * Math.PI);
ctx.fillStyle = "#f1c40f";
ctx.fill();
ctx.lineWidth = 2;
ctx.stroke();

// mata
ctx.fillStyle = "black";
ctx.fillRect(60, 40, 5, 5);
ctx.fillRect(85, 40, 5, 5);

// senyum
ctx.beginPath();
ctx.arc(75, 60, 20, 0, Math.PI);
ctx.stroke();
</script>

</body>
</html>
